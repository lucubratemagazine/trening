<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Treningsplan</title>

    <!-- PWA -->
    <meta name="theme-color" content="#1E40AF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

    <h1>Treningsplan</h1>
    <div id="weekHeader"></div>

    <div class="btn-row">
        <button onclick="changeWeek(-1)">Forrige uke</button>
        <button onclick="changeWeek(1)">Neste uke</button>
    </div>

    <div class="header-row">
        <h2 id="todayTitle">Dagens økt</h2>
        <button class="small-btn" onclick="openExerciseModal()">Fullfør øvelser</button>
    </div>

    <div class="box" id="todayBox">Laster...</div>

    <h2 id="tomorrowTitle">Morgendagens økt</h2>
    <div class="box" id="tomorrowBox">Laster...</div>

    <div class="header-row">
        <h2>Ukemål</h2>
        <button class="small-btn" onclick="openGoalsModal()">🎯 Mål</button>
    </div>

    <div class="btn-row">
        <button onclick="window.location.href='historikk.html'">Historikk</button>
    </div>

    <div class="box" id="goalBox">Laster...</div>

    <div class="info" id="debugInfo"></div>

</div> <!-- slutt på app-container -->

<!-- Mål-modal -->
<div class="modal-overlay" id="goalsOverlay" onclick="closeGoalsModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3>Ukemål og langsiktige mål</h3>

    <section>
      <strong>Ukemål (denne uken):</strong>
      <div id="goalsWeekText"></div>
    </section>

    <section>
      <strong>Vekt denne uken:</strong><br>
      <input type="number" id="weightInput" step="0.1"> kg
      <button class="small-btn" id="weightSaveBtn" onclick="saveWeight()">Lagre</button>
      <div id="weightStatus"></div>
      <div id="weightChange"></div>
    </section>

    <section>
      <strong>Km denne uken:</strong>
      <div id="kmWeek"></div>
    </section>

    <div class="modal-footer">
      <button onclick="closeGoalsModal()">Lukk</button>
    </div>
  </div>
</div>

<!-- Øvelses-modal -->
<div class="modal-overlay" id="exerciseOverlay" onclick="closeExerciseModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3>Dagens øvelser</h3>
    <div id="exerciseList"></div>
    <div id="kmFields"></div>

    <div class="modal-footer">
      <button onclick="closeExerciseModal()">Lukk</button>
    </div>
  </div>
</div>

<!-- ADMIN-MODAL -->
<div class="modal-overlay" id="adminOverlay" onclick="closeAdminModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3>Manuell registrering</h3>

    <label>Uke:</label>
    <input type="number" id="adminWeek" min="1" max="8">

    <label>Dag:</label>
    <select id="adminDay">
      <option value="0">Mandag</option>
      <option value="1">Tirsdag</option>
      <option value="2">Onsdag</option>
      <option value="3">Torsdag</option>
      <option value="4">Fredag</option>
      <option value="5">Lørdag</option>
      <option value="6">Søndag</option>
    </select>

    <h4>Øvelser:</h4>
    <div id="adminExercises"></div>

    <h4>Kilometer:</h4>
    <label>Km sykkel:</label>
    <input type="number" id="adminKmSykkel" step="0.1">

    <label>Km gå:</label>
    <input type="number" id="adminKmGaa" step="0.1">

    <hr>

    <h3>Vektregistrering</h3>
    <label for="adminWeight">Vekt (kg):</label>
    <input type="number" id="adminWeight" step="0.1" placeholder="f.eks. 82.4">

    <button onclick="saveAdminWeight()" class="adminSaveBtn">Lagre vekt</button>

    <div class="modal-footer">
      <button onclick="saveAdminEntry()">Lagre</button>
      <button onclick="closeAdminModal()">Lukk</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<button id="fabToday" onclick="scrollToToday()">Dagens økt</button>

<script src="messages.js"></script>
<script src="data_weeks.js"></script>
<script src="data_exercises.js"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
